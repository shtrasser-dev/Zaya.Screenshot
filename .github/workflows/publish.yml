name: Publish

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build plugin & NuGet
        run: build.cmd

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: out/*.nupkg
          retention-days: 1

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: out/*.zip
          retention-days: 1

  publish-github:
    needs: build
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: packages

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push packages/*.nupkg \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  publish-gitverse:
    needs: build
    if: contains(github.server_url, 'gitverse.ru')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: packages

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Push to GitVerse Packages
        run: |
          dotnet nuget push packages/*.nupkg \
            --source https://gitverse.ru/api/packages/${{ github.repository_owner }}/nuget/index.json \
            --api-key ${{ secrets.NUGET_TOKEN }} \
            --skip-duplicate

  publish-nuget:
    needs: build
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: packages

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: shtrasser

      - name: Push to NuGet.org
        run: |
          dotnet nuget push packages/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  create-release:
    needs: build
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin
          path: plugin

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const zipFile = fs.readdirSync('plugin').find(f => f.endsWith('.zip'));
            if (!zipFile) { core.setFailed('No zip file found'); return; }

            const version = zipFile.replace(/.*-(\d+\.\d+\.\d+)\.zip$/, '$1');
            const tag = `plugin-v${version}`;

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Plugin v${version}`,
              body: `Plugin release for Zaya.Screenshot v${version}.`,
              generate_release_notes: true
            });

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: zipFile,
              data: fs.readFileSync(path.join('plugin', zipFile))
            });
