  assemblies:
  - Zaya.Screenshot.Impl.Windows
  namespace: Zaya.Screenshot.Impl.Windows.Services.Impl
  summary: >-
    Creates a new capture session for the specified region.

    For monitor captures, the first few frames are discarded to avoid initial black frames.
  example: []
  syntax:
    content: public Task<ICaptureSession> CreateSessionAsync(ICaptureRegion region, CancellationToken cancellationToken = default)
    parameters:
    - id: region
      type: Zaya.Screenshot.Models.ICaptureRegion
      description: >-
        The region to capture. Must be one of <xref href="Zaya.Screenshot.Models.FullScreenWindowRegion" data-throw-if-not-resolved="false"></xref>,
            <xref href="Zaya.Screenshot.Models.RectWindowRegion" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.Screenshot.Models.FullScreenDesktopRegion" data-throw-if-not-resolved="false"></xref>, or <xref href="Zaya.Screenshot.Models.RectDesktopRegion" data-throw-if-not-resolved="false"></xref>.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Token to cancel the session creation.
    return:
      type: System.Threading.Tasks.Task{Zaya.Screenshot.Services.ICaptureSession}
      description: An active capture session ready to produce frames.
    content.vb: Public Function CreateSessionAsync(region As ICaptureRegion, cancellationToken As CancellationToken = Nothing) As Task(Of ICaptureSession)
  overload: Zaya.Screenshot.Impl.Windows.Services.Impl.CaptureService.CreateSessionAsync*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">region</code> is null.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the GraphicsCaptureItem cannot be created.
  - type: System.NotSupportedException
    commentId: T:System.NotSupportedException
    description: Thrown when the region type is not recognized.
  implements:
  - Zaya.Screenshot.Services.ICaptureService.CreateSessionAsync(Zaya.Screenshot.Models.ICaptureRegion,System.Threading.CancellationToken)
